    </pattern>
    <linearGradient id="piece-fill" x1="11" y1="11" x2="53" y2="53" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6d8d5d" />
      <stop offset="1" stop-color="#2f8058" />
