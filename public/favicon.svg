  </defs>
  <rect width="64" height="64" rx="13" fill="#07100d" />
  <rect x="6" y="6" width="52" height="52" rx="10" fill="#0b1612" stroke="#26392f" stroke-width="2" />
  <g stroke="#345043" stroke-width="2">
